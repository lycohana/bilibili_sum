<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BriefVid - 快速为视频生成摘要和关键要点" />
    <meta name="theme-color" content="#fb7299" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BriefVid" />
    <title>BriefVid</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/static/favicon-32x32.png" type="image/png" sizes="32x32" />
    <link rel="alternate icon" href="/static/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- 侧边栏导航 -->
      <aside class="sidebar" role="navigation" aria-label="主导航">
        <!-- 品牌标识 -->
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <img src="/static/assets/icons/icon.svg" alt="" />
          </div>
          <div class="brand-text">
            <p class="eyebrow">Local First</p>
            <h1>BriefVid</h1>
          </div>
        </div>

        <!-- 主导航菜单 -->
        <nav class="nav" id="nav" role="tablist" aria-label="页面导航">
          <button class="nav-item active" data-route="library" role="tab" aria-selected="true" aria-controls="view-root">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="3" y="4" width="18" height="14" rx="3"></rect>
              <path d="M7 20h10"></path>
            </svg>
            <span>视频库</span>
          </button>
          <button class="nav-item" data-route="settings" role="tab" aria-selected="false" aria-controls="view-root">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            <span>设置</span>
          </button>
        </nav>

        <!-- 实时状态面板 -->
        <section class="live-panel" aria-label="实时状态">
          <div class="panel-header">
            <h2>实时状态</h2>
            <p>服务运行状态和任务进度</p>
          </div>
          <div id="live-status" class="status-stack" role="status" aria-live="polite"></div>
        </section>
      </aside>

      <!-- 主内容区域 -->
      <main class="content" role="main">
        <!-- 页面头部 -->
        <header class="page-header">
          <div class="page-header-content">
            <p class="eyebrow" id="page-eyebrow">视频库</p>
            <h2 id="page-title">本地视频库与处理结果</h2>
          </div>
          <div class="header-actions">
            <span id="service-badge" class="service-badge service-online" role="status" aria-live="polite">
              <span class="status-dot" aria-hidden="true"></span>
              <span class="service-text">服务在线</span>
            </span>
          </div>
        </header>

        <!-- 视图根容器 -->
        <div id="view-root" role="tabpanel" aria-label="内容区域"></div>
      </main>
    </div>

    <!-- 主脚本 -->
    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
