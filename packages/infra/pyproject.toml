[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "video-sum-infra"
version = "1.6.0"
description = "Infrastructure layer for the local video summarizer."
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10,<3.0",
  "pydantic-settings>=2.7,<3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/video_sum_infra"]
