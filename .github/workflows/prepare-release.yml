name: Prepare Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-release:
    if: ${{ github.event.head_commit != null && !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.detect.outputs.bump }}
      next_version: ${{ steps.detect.outputs.next_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect bump level
        id: detect
        run: python scripts/detect_bump.py --github-output "$GITHUB_OUTPUT"

      - name: Stop when no release is needed
        if: ${{ steps.detect.outputs.bump == '' }}
        run: echo "No release bump detected for this push."

  validate-windows-package:
    needs: detect-release
    if: ${{ needs.detect-release.outputs.bump != '' }}
    runs-on: windows-latest
    outputs:
      release_version: ${{ needs.detect-release.outputs.next_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Apply release version for validation build
        run: python scripts/bump_version.py "${{ needs.detect-release.outputs.bump }}"

      - name: Verify version files are synced
        run: python scripts/bump_version.py --check

      - name: Install desktop dependencies
        run: npm ci --prefix apps/desktop

      - name: Prepare electron-builder cache
        shell: pwsh
        run: |
          $winCodeSignDir = "$env:LOCALAPPDATA\electron-builder\Cache\winCodeSign"
          $darwinLibDir = Join-Path $winCodeSignDir "darwin\10.12\lib"
          New-Item -ItemType Directory -Force -Path $darwinLibDir | Out-Null
          "2.6.0" | Out-File -FilePath (Join-Path $winCodeSignDir ".version") -Encoding utf8
          foreach ($name in @("libcrypto.dylib", "libssl.dylib")) {
            $target = Join-Path $darwinLibDir $name
            if (-not (Test-Path $target)) {
              New-Item -ItemType File -Force -Path $target | Out-Null
            }
          }

      - name: Build Windows release candidate
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_PLATFORM: "windows"
        run: npm run package:win

      - name: Archive unpacked app
        shell: pwsh
        run: |
          $archive = "dist/desktop/BriefVid-${{ needs.detect-release.outputs.next_version }}-win-x64-unpacked.zip"
          if (Test-Path $archive) {
            Remove-Item -LiteralPath $archive -Force
          }
          Compress-Archive -Path "dist/desktop/win-unpacked/*" -DestinationPath $archive

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ needs.detect-release.outputs.next_version }}
          path: |
            dist/desktop/BriefVid-*-Setup.exe
            dist/desktop/BriefVid-*-win-x64-unpacked.zip
          if-no-files-found: error

  create-release-tag:
    needs:
      - detect-release
      - validate-windows-package
    if: ${{ needs.detect-release.outputs.bump != '' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.push_release.outputs.release_created }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check branch head is unchanged
        id: head_check
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          git fetch origin "${TARGET_BRANCH}"
          remote_head="$(git rev-parse "origin/${TARGET_BRANCH}")"
          if [ "${remote_head}" != "${TRIGGER_SHA}" ]; then
            echo "branch_unchanged=false" >> "$GITHUB_OUTPUT"
            echo "Branch advanced from ${TRIGGER_SHA} to ${remote_head}; skip this release run."
            exit 0
          fi
          echo "branch_unchanged=true" >> "$GITHUB_OUTPUT"

      - name: Bump repository version
        if: ${{ steps.head_check.outputs.branch_unchanged == 'true' }}
        run: python scripts/bump_version.py "${{ needs.detect-release.outputs.bump }}"

      - name: Commit release version and tag
        id: push_release
        if: ${{ steps.head_check.outputs.branch_unchanged == 'true' }}
        env:
          RELEASE_VERSION: ${{ needs.detect-release.outputs.next_version }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Release tag v${RELEASE_VERSION} already exists; skip publishing from this run."
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION pyproject.toml apps/service/pyproject.toml packages/core/pyproject.toml packages/infra/pyproject.toml apps/desktop/package.json apps/desktop/package-lock.json
          git commit -m "chore(release): v${RELEASE_VERSION} [skip ci]"
          git tag -a "v${RELEASE_VERSION}" -m "v${RELEASE_VERSION}"
          git push origin "HEAD:${TARGET_BRANCH}"
          git push origin "refs/tags/v${RELEASE_VERSION}"
          echo "release_created=true" >> "$GITHUB_OUTPUT"

  publish-release:
    needs:
      - detect-release
      - validate-windows-package
      - create-release-tag
    if: ${{ needs.detect-release.outputs.bump != '' && needs.create-release-tag.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-${{ needs.detect-release.outputs.next_version }}
          path: dist/desktop

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-release.outputs.next_version }}
          generate_release_notes: true
          files: |
            dist/desktop/BriefVid-*-Setup.exe
            dist/desktop/BriefVid-*-win-x64-unpacked.zip
